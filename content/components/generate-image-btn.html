<button
    type="button"
    class="border border-dashed rounded px-3 py-1.5 text-xs text-slate-500 hover:bg-slate-100 hover:text-slate-700"
    data-type="[[type]]"
    data-id="{{id}}"
    data-force="true"
    data-confirm
    data-confirm-message="Generate image for this [[label]]?"
    data-confirm-subtext="Generate an image based on the name and description."
    data-confirm-confirm-text="Generate"
    data-confirm-request-method="POST"
    data-confirm-request-url="/api/admin/generate-images"
    data-confirm-event="[[event]]"
    data-confirm-spinner="Generating image..."
>
    Generate Image
</button>
