<div id="pagination" class="mt-3">
    <div id="pagination-content" class="text-xs text-slate-600">(Loading pagination…)</div>
</div>

<!-- Client-side template: render pagination from { meta } -->
<template id="pagination-template">
    <div class="flex flex-wrap items-center justify-between gap-3 text-xs text-slate-600">
        <div>
            {{#if meta.total}} Showing <span class="font-mono">{{meta.from}}</span>–<span class="font-mono"
                >{{meta.to}}</span
            >
            of
            <span class="font-mono">{{meta.total}}</span>
            {{else}} No results {{/if}}
        </div>

        <div class="flex items-center gap-2">
            {{#if meta.prev_page}}
            <button
                type="button"
                class="border rounded px-2 py-1 hover:bg-slate-50 disabled:opacity-50 disabled:hover:bg-transparent"
                data-action="paginate-prev"
                data-page="{{meta.prev_page}}"
                data-pagination-source="{{source}}"
                data-pagination-param="{{param}}"
            >
                Prev
            </button>
            {{else}}
            <button type="button" class="border rounded px-2 py-1 opacity-50" disabled>Prev</button>
            {{/if}}

            <span class="text-slate-500">Page</span>
            <span class="font-mono">{{meta.current_page}}</span>
            <span class="text-slate-500">/</span>
            <span class="font-mono">{{meta.last_page}}</span>

            {{#if meta.next_page}}
            <button
                type="button"
                class="border rounded px-2 py-1 hover:bg-slate-50 disabled:opacity-50 disabled:hover:bg-transparent"
                data-action="paginate-next"
                data-page="{{meta.next_page}}"
                data-pagination-source="{{source}}"
                data-pagination-param="{{param}}"
            >
                Next
            </button>
            {{else}}
            <button type="button" class="border rounded px-2 py-1 opacity-50" disabled>Next</button>
            {{/if}}

            {{#if meta.last_page}}
            <form
                class="inline-flex items-center gap-1 ml-2"
                data-action="paginate-goto"
                data-pagination-source="{{source}}"
                data-pagination-param="{{param}}"
                data-last-page="{{meta.last_page}}"
            >
                <label class="text-slate-500">Go to</label>
                <input
                    type="number"
                    min="1"
                    max="{{meta.last_page}}"
                    class="border rounded px-2 py-1 w-14 font-mono text-center"
                    placeholder="#"
                    autocomplete="off"
                />
            </form>
            {{/if}}
        </div>
    </div>
</template>
