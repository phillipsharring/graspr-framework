<!DOCTYPE html>
<html lang="en" class="h-full" style="overflow-y: scroll;">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>[[title]]Graspr</title>
        [[cssHref]] [[jsSrc]]
        [[pageHead]]
        <script>
        window.onReady = function(fn) {
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', fn);
            } else {
                fn();
            }
        };
        </script>
        <style>body { opacity: 0; }</style>
    </head>
    <body class="h-full" hx-boost="true" hx-ext="client-side-templates" hx-target="#app" hx-select="#app" hx-swap="outerHTML">
        <header
            class="fixed top-0 inset-x-0 h-14 px-6 border-b z-50 bg-slate-100"
        >
            <div class="h-full flex gap-3 items-center">
                <h4 class="text-lg font-bold font-serif italic tracking-tight">
                    <a href="[[siteUrl]]">Graspr</a>
                </h4>
                <div class="ml-auto">
                    <component file="auth/auth-links.html"></component>
                </div>
            </div>
        </header>
        <main id="app" data-layout="base" class="p-6 pt-20 pb-20">[[app]]</main>
        <footer
            class="fixed bottom-0 inset-x-0 px-6 py-4 border-t bg-slate-200 z-50 pb-[calc(1rem+env(safe-area-inset-bottom))] flex items-center"
        >
            <nav class="flex flex-row flex-wrap gap-4 text-xs">
                <a data-nav href="/about/">About</a>
                <a data-nav href="/docs/">Docs</a>
            </nav>
            <p class="text-xs text-slate-500 ml-auto">
                [[copyright]] |
                <a href="/">Home</a> |
                <a href="/game/">Game</a> |
                <a href="/admin/">Admin</a> |
                <a href="/examples/">Examples</a>
            </p>
        </footer>
        <modal></modal>
        <toast></toast>
        <confirm-dialog></confirm-dialog>
        <component file="auth/login-modal.html"></component>
    </body>
</html>
