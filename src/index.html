<!DOCTYPE html>
<html lang="en">
    <head>
        <!--
          Vite HTML entry (dev + asset bundling).

          The real site pages are built from HTML templates:
            - src/layouts/base.html
            - src/pages/*.html

          Generate them with:
            npm run build
            npm run preview
        -->
        <title>Graspr (dev)</title>
        <script defer type="module" src="app.js"></script>
    </head>

    <body>
        <main id="app" class="p-6 pt-28">
            <h1 class="text-2xl font-bold">Graspr (dev shell)</h1>
            <p class="mt-2 text-slate-600">
                The real static pages are generated from <code>src/pages/*.html</code> with the layout in
                <code>src/layouts/base.html</code>.
            </p>
            <p class="mt-2 text-slate-600">
                Build + preview them with: <code>npm run build</code> then <code>npm run preview</code>.
            </p>
        </main>
    </body>
</html>
